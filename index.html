<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Date With Me? ❤️</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
emailjs.init("tAgbJQ3WSTlwIatq5");
</script>

</head>
<body>

<header>
    ❤️ A Very Important Question ❤️
</header>

<audio id="bgMusic" loop>
    <source src="assets/music/perfect.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <img
    src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
    class="cute-img"
    alt="Cute Bear">

    <h1>Will you go on a date with me? 🥺❤️</h1>

    <div class="buttons">
        <button id="yesBtn">YES 💖</button>
        <button id="noBtn">NO 😏</button>
    </div>

    <div id="dateSection" class="hidden">

        <h2>Yayyyyy! Pick our date ❤️</h2>

        <input type="date" id="datePicker">

        <button id="submitDate">
            Confirm Date 💌
        </button>

        <p id="successMessage"></p>

    </div>

</div>



<script src="script.js"></script>

</body>
</html>
